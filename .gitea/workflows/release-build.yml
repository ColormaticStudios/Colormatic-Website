name: Build and attach release artifact

on:
  release:
    types:
      - published

jobs:
  release:
    runs-on: colormatic-bun-ci-runner
    env:
      REPO: ${{ gitea.repository.full_name || github.repository }}
      EVENT_SHA: ${{ gitea.sha || github.sha }}
      SERVER_URL: ${{ gitea.server_url || github.server_url }}
      RELEASE_UPLOAD_URL: ${{ gitea.event.release.upload_url }}
      RELEASE_TAG: ${{ gitea.event.release.tag_name || github.event.release.tag_name }}
    steps:
      - name: Checkout repository
        uses: https://git.colormatic.org/ColormaticStudios/actions/actions/manual-checkout@main
        with:
          repository: ${{ env.REPO }}
          sha: ""
          fallback-sha: ${{ env.EVENT_SHA }}
          server-url: ${{ env.SERVER_URL }}
          token: ${{ secrets.access_token }}
          working-directory: .

      - name: Verify Bun
        run: bun --version

      - name: Restore Bun dependency cache
        id: bun-deps-cache
        uses: https://git.colormatic.org/ColormaticStudios/actions/actions/cache-restore@main
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: bun-deps-${{ hashFiles('bun.lock', 'bun.lockb', 'package.json') }}
          restore-keys: |
            bun-deps-

      - name: Restore SvelteKit build cache
        id: sveltekit-build-cache
        uses: https://git.colormatic.org/ColormaticStudios/actions/actions/cache-restore@main
        with:
          path: |
            .svelte-kit
            .vite
          key: sveltekit-build-${{ hashFiles('bun.lock', 'bun.lockb', 'package.json') }}-${{ hashFiles('src/**', 'static/**', 'svelte.config.*', 'vite.config.*', 'tsconfig*.json', 'package.json') }}
          restore-keys: |
            sveltekit-build-${{ hashFiles('bun.lock', 'bun.lockb', 'package.json') }}-
            sveltekit-build-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Save Bun dependency cache
        if: ${{ success() && steps.bun-deps-cache.outputs.cache-hit != 'true' }}
        uses: https://git.colormatic.org/ColormaticStudios/actions/actions/cache-save@main
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ steps.bun-deps-cache.outputs.cache-primary-key }}
          matched-key: ${{ steps.bun-deps-cache.outputs.cache-matched-key }}

      - name: Save SvelteKit build cache
        if: ${{ success() && steps.sveltekit-build-cache.outputs.cache-hit != 'true' }}
        uses: https://git.colormatic.org/ColormaticStudios/actions/actions/cache-save@main
        with:
          path: |
            .svelte-kit
            .vite
          key: ${{ steps.sveltekit-build-cache.outputs.cache-primary-key }}
          matched-key: ${{ steps.sveltekit-build-cache.outputs.cache-matched-key }}

      - name: Create release archive
        uses: https://git.colormatic.org/ColormaticStudios/actions/actions/create-tar-gz@main
        with:
          source-directory: build
          archive-path: release.tar.gz
          working-directory: .

      - name: Upload artifact to release
        uses: https://git.colormatic.org/ColormaticStudios/actions/actions/upload-release-asset@main
        with:
          token: ${{ secrets.access_token }}
          upload-url: ${{ env.RELEASE_UPLOAD_URL }}
          asset-path: release.tar.gz
          asset-name: release.tar.gz
          mime-type: application/gzip
          working-directory: .
