name: Build and attach release artifact

on:
  release:
    types:
      - published

jobs:
  release:
    runs-on: colormatic-bun-ci-runner
    env:
      REPO: ${{ gitea.repository.full_name || github.repository }}
      EVENT_SHA: ${{ gitea.sha || github.sha }}
      SERVER_URL: ${{ gitea.server_url || github.server_url }}
      RELEASE_UPLOAD_URL: ${{ gitea.event.release.upload_url }}
    steps:
      - name: Checkout repository
        uses: https://git.colormatic.org/ColormaticStudios/actions/actions/manual-checkout@main
        with:
          repository: ${{ env.REPO }}
          sha: ${{ inputs.checkout-ref }}
          fallback-sha: ${{ env.EVENT_SHA }}
          server-url: ${{ env.SERVER_URL }}
          token: ${{ secrets.access_token }}
          working-directory: ${{ inputs.working-directory }}

      - name: Verify Bun
        run: bun --version

      - name: Restore Bun dependency cache
        uses: https://github.com/actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            ${{ inputs.working-directory }}/node_modules
          key: bun-deps-${{ hashFiles(format('{0}/bun.lock', inputs.working-directory), format('{0}/bun.lockb', inputs.working-directory), format('{0}/package.json', inputs.working-directory)) }}
          restore-keys: |
            bun-deps-

      - name: Restore SvelteKit build cache
        uses: https://github.com/actions/cache@v4
        with:
          path: |
            ${{ inputs.working-directory }}/.svelte-kit
            ${{ inputs.working-directory }}/.vite
          key: sveltekit-build-${{ hashFiles(format('{0}/bun.lock', inputs.working-directory), format('{0}/bun.lockb', inputs.working-directory), format('{0}/package.json', inputs.working-directory)) }}-${{ hashFiles(format('{0}/src/**', inputs.working-directory), format('{0}/static/**', inputs.working-directory), format('{0}/svelte.config.*', inputs.working-directory), format('{0}/vite.config.*', inputs.working-directory), format('{0}/tsconfig*.json', inputs.working-directory), format('{0}/package.json', inputs.working-directory)) }}
          restore-keys: |
            sveltekit-build-${{ hashFiles(format('{0}/bun.lock', inputs.working-directory), format('{0}/bun.lockb', inputs.working-directory), format('{0}/package.json', inputs.working-directory)) }}-
            sveltekit-build-

      - name: Install dependencies
        if: ${{ inputs.install-command != '' }}
        run: ${{ inputs.install-command }}

      - name: Build
        run: ${{ inputs.build-command }}

      - name: Create release archive
        uses: https://git.colormatic.org/ColormaticStudios/actions/actions/create-tar-gz@main
        with:
          source-directory: ${{ inputs.build-directory }}
          archive-path: ${{ inputs.archive-name }}
          working-directory: ${{ inputs.working-directory }}

      - name: Upload artifact to release
        uses: https://git.colormatic.org/ColormaticStudios/actions/actions/upload-release-asset@main
        with:
          token: ${{ secrets.access_token }}
          upload-url: ${{ env.RELEASE_UPLOAD_URL }}
          asset-path: ${{ inputs.archive-name }}
          asset-name: ${{ inputs.archive-name }}
          mime-type: ${{ inputs.mime-type }}
          working-directory: ${{ inputs.working-directory }}
